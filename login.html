<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

  <div class="left-panel">
    <h1>Fund Transfer System</h1>
    <p>
      Secure, fast, and reliable digital banking platform.
    </p>

    <div class="methods">
      <span>NEFT</span>
      <span>RTGS</span>
      <span>IMPS</span>
    </div>
  </div>

  <div class="right-panel">

    <div class="login-box">
      <h2>Welcome Back</h2>
      <p>Login to your bank account</p>

      <form>

        <input type="email" placeholder="Enter your email">

        <input type="password" placeholder="Enter your password">

        <div class="options">
          <label>
            <input type="checkbox">
            Remember me
          </label>

          <a href="#">Forgot password?</a>
        </div>

        <button type="submit">Sign In</button>

      </form>

      <div class="demo-box">
        <h4>Demo Credentials</h4>

        <p>Admin: admin@fundtransfer.com / Admin@123</p>
        <p>User: rahul@example.com / User@123</p>
      </div>

    </div>

  </div>

</div>

</body>
</html>
